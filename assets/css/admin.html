<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAPTO Admin</title>

    <link rel="stylesheet" href="assets/css/admin.css">
</head>

<body>

<div class="container">

<h1>GRAPTO ADMIN PANEL</h1>
<p>Manage your website without editing code.</p>

<hr>

<h2>Company Logo</h2>

<input type="file">

<button>Upload Logo</button>

<hr>

<h2>Website Banner</h2>

<input type="file">

<button>Upload Banner</button>

<hr>

<h2>Google Form Link</h2>

<input
type="text"
placeholder="Paste your Google Form Link here">

<button>Save Form Link</button>

<hr>

<h2>Company Information</h2>

<input
type="text"
placeholder="Company Name">

<input
type="text"
placeholder="Phone Number">

<input
type="email"
placeholder="Company Email">

<input
type="text"
placeholder="Office Address">

<button>Save Company Details</button>

<hr>

<h2>Social Links</h2>

<input
type="text"
placeholder="LinkedIn URL">

<input
type="text"
placeholder="Instagram URL">

<input
type="text"
placeholder="Facebook URL">

<button>Save Social Links</button>

<hr>

<h2>Services</h2>

<textarea
rows="8"
placeholder="One service per line"></textarea>

<button>Save Services</button>

<hr>

<h2>Status</h2>

<p>Website Version : 1.0</p>

<p>Company : GRAPTO</p>

<p>Location : Siliguri, West Bengal</p>

</div>

<script src="assets/js/admin.js"></script>

</body>
</html>
